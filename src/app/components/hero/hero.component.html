  <!-- Floating spores -->
  <div id="spores"></div>

  <!-- MAIN BANNER -->
  <div class="banner-frame reveal">
    <div class="corner corner-tl"></div>
    <div class="corner corner-tr"></div>
    <div class="corner corner-bl"></div>
    <div class="corner corner-br"></div>

    <div class="banner-inner">
      <!-- TEXT COLUMN -->
      <div class="banner-text-col">
        <p class="banner-eyebrow">Desenvolvedora Front-End</p>
        <h1 class="banner-title">
          <em>Isabel Paixão</em>
          Teço Mundos<br>em Código
        </h1>
        <p class="banner-sub">
          Como a Hornet de Hollow Knight — que tece seus fios com precisão e propósito —
          crio interfaces que conectam o invisível ao visível. Angular, Firebase e uma
          dose de magia front-end.
        </p>
        <div class="banner-cta">
          <a href="#projetos" class="btn-game">▶ VER PROJETOS</a>
          <a href="#contato" class="btn-outline-game">◈ CONTATO</a>
        </div>
      </div>

      <div class="banner-hornet-col">
        <div class="banner-hornet-glow"></div>
        <svg class="hornet-large-svg" viewBox="0 0 280 400" xmlns="http://www.w3.org/2000/svg">

          <ellipse cx="140" cy="280" rx="100" ry="90" fill="rgba(139,10,31,0.15)"/>

          <path d="M 90 230 Q 30 160 5 130"                   fill="none" stroke="rgba(216,202,180,0.3)" stroke-width="0.8"/>
          <path d="M 90 230 Q 60 290 30 330 Q 10 360 30 390"  fill="none" stroke="rgba(216,202,180,0.2)" stroke-width="0.8"/>

          <path d="M 100 240 Q 50 300 55 370 Q 100 360 140 370 Q 180 360 225 370 Q 230 300 180 240 Z" fill="#6B0A1A"/>
          <path d="M 108 245 Q 65 305 68 365 Q 105 356 140 360 L 140 245 Z"  fill="#9B1428" opacity="0.8"/>
          <path d="M 172 245 Q 215 305 212 365 Q 175 356 140 360 L 140 245 Z" fill="#7B0D1E" opacity="0.7"/>

          <path d="M 125 248 Q 95 310 96 358"  fill="none" stroke="rgba(200,16,46,0.2)" stroke-width="0.5"/>

          <ellipse cx="36" cy="206" rx="5" ry="5" fill="#C8C0A8"/>
          <ellipse cx="30" cy="200" rx="3" ry="3" fill="#D8CAB4"/>
          <!-- Needle guard -->
          <ellipse cx="88" cy="276" rx="8" ry="4" fill="#1A1030" transform="rotate(-40 88 276)"/>
          <!-- Mask -->
          <ellipse cx="140" cy="165" rx="42" ry="48" fill="#D0C4AE"/>
          <ellipse cx="140" cy="165" rx="38" ry="44" fill="#E2D6C0"/>
          <!-- Mask texture -->
          <path d="M 116 148 Q 140 140 164 148" fill="none" stroke="rgba(100,85,70,0.25)" stroke-width="0.6"/>
          <path d="M 112 163 Q 140 157 168 163" fill="none" stroke="rgba(100,85,70,0.2)"  stroke-width="0.6"/>

          <ellipse cx="156" cy="170" rx="10" ry="13" fill="#060309"/>
          <ellipse cx="121" cy="167" rx="3" ry="3" fill="rgba(200,16,46,0.6)"/>
          <ellipse cx="153" cy="167" rx="3" ry="3" fill="rgba(200,16,46,0.6)"/>

          <circle cx="112" cy="55" r="3.5" fill="#D8CAB4"/>

          <path d="M 115 218 Q 140 210 165 218" fill="none" stroke="rgba(200,164,74,0.35)" stroke-width="1"/>
          <circle cx="140" cy="212" r="4" fill="rgba(200,164,74,0.3)"/>

          <path d="M 70 360 Q 90 375 110 370 Q 125 368 140 372 Q 155 368 170 370 Q 190 375 210 360" fill="none" stroke="rgba(200,16,46,0.3)" stroke-width="0.8"/>
          <!-- Floating silk threads (right side) -->
          <path d="M 200 220 Q 240 200 265 215" fill="none" stroke="rgba(216,202,180,0.25)" stroke-width="0.7"/>
          <path d="M 205 240 Q 250 235 270 255" fill="none" stroke="rgba(216,202,180,0.2)"  stroke-width="0.7"/>
          <path d="M 198 260 Q 245 270 268 285" fill="none" stroke="rgba(216,202,180,0.15)" stroke-width="0.7"/>
        </svg>
      </div>
    </div>

  <!-- Scroll hint -->
  <div class="hero-scroll">
    <span>EXPLORAR</span>
